services:
  kickup-next:
    container_name: kickup-next
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped

    env_file:
      - .env.local

    environment:
      - NODE_ENV=production
      - PORT=3000
      # Inside Docker, `127.0.0.1` refers to the frontend container itself.
      # Point proxy to the backend container on the shared docker network.
      - GRAPHQL_PROXY_TARGET=http://kickup-api:3008/graphql
      - NEXT_PUBLIC_API_BASE_URL=http://kickup-api:3008
      - NEXT_PUBLIC_DEBUG_GRAPHQL=false

    ports:
      - "4000:3000"

    volumes:
      - ./:/app

    # Install deps on startup because host bind-mount can hide image node_modules.
    command: sh -c "yarn install && yarn build && yarn start -p 3000"

    networks:
      - kickup-network

networks:
  kickup-network:
    external: true