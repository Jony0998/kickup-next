# Ikkala stack (kickup + kickup-next) Dockerda ishlaganda:
# 1) Avval kickup papkada: docker compose up -d
# 2) Tarmoq nomi: odatda "kickup_monorepo-network" (docker network ls)
# 3) keyin kickup-next:
#    docker compose -f docker-compose.yml -f docker-compose.kickup-network.yml up -d
#
# Bu holda GRAPHQL_PROXY_TARGET = konteyner ichidagi kickup-api:3008 (host 4002 emas)

services:
  kickup-next:
    networks:
      - kickup-api-net
    environment:
      - GRAPHQL_PROXY_TARGET=http://kickup-api:3008/graphql
      - GRAPHQL_TRY_INTERNAL_FIRST=1

networks:
  kickup-api-net:
    external: true
    name: kickup_monorepo-network
